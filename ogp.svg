  <text x="695" y="428" font-family="sans-serif" font-size="18" fill="#c4b5fd" text-anchor="middle">日本語対応</text>

  <rect x="795" y="400" width="150" height="44" rx="22" fill="#1a0a3a" stroke="#6d28d9" stroke-opacity="0.5" stroke-width="1"/>
