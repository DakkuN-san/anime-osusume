      <stop offset="100%" style="stop-color:#12002a"/>
    </linearGradient>
    <radialGradient id="glow1" cx="20%" cy="30%" r="50%">
      <stop offset="0%" style="stop-color:#6d28d9;stop-opacity:0.35"/>
